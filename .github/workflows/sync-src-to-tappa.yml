# Mirror terra's src/ into rspatial/tappa/terra_core/ whenever src/ changes on
# the default branch. That folder holds upstream C++ only; Python code stays under
# src/, pybind glue under native/terra_module.cpp.
#
# Requires repo secret TAPPA_SYNC_PAT (fine-grained: Contents write on tappa).
# If the Python repo is named tarra, change TAPPA_REPO below.

name: Sync src to tappa

on:
  push:
    branches: [main, master]
    paths:
      - "src/**"
  workflow_dispatch:

concurrency:
  group: sync-src-to-tappa
  cancel-in-progress: true

env:
  TAPPA_REPO: rspatial/tappa
  TAPPA_BRANCH: main

jobs:
  sync:
    if: github.repository == 'rspatial/terra'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout terra (this repo)
        uses: actions/checkout@v4
        with:
          path: terra

      - name: Checkout tappa
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TAPPA_REPO }}
          ref: ${{ env.TAPPA_BRANCH }}
          path: tappa
          token: ${{ secrets.TAPPA_SYNC_PAT }}

      - name: Mirror src/ into tappa/terra_core
        run: |
          set -euo pipefail
          mkdir -p tappa/terra_core
          rsync -a --delete terra/src/ tappa/terra_core/

      - name: Commit and push if changed
        working-directory: tappa
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A terra_core
          if git diff --staged --quiet; then
            echo "No changes to terra_core/ after sync."
            exit 0
          fi
          git commit -m "Sync terra_core/ from rspatial/terra@${{ github.sha }}"
          git push origin HEAD:${{ env.TAPPA_BRANCH }}
