# Windows-only prebuilt wheels (GDAL/GEOS/PROJ via vcpkg). Linux/macOS users are
# expected to use conda/system libs and build from source.
# Runs on tag pushes whose names start with "py" (R/CRAN tags must not use that prefix).
# Uploads to PyPI when such a tag is pushed.
#
# PyPI (trusted publishing): register this workflow in PyPI’s trusted publisher settings.
# Optional: add `environment: pypi` on the upload job for deploy approvals.
# See https://docs.pypi.org/trusted-publishers/

name: Python wheels

on:
  workflow_dispatch:
  push:
    tags:
      - "py*"

jobs:
  build_wheels:
    name: Windows wheels
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # Isolated PEP 517 builds only see python/; CMake expects ../src from a full clone.
      - name: Vendor C++ sources into python/ for wheel builds
        shell: bash
        run: |
          rm -rf python/_geospat_cpp_src
          cp -a src python/_geospat_cpp_src

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23.3
        with:
          package-dir: python

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-windows
          path: ./wheelhouse/*.whl

  upload_pypi:
    name: Upload wheels to PyPI
    needs: [build_wheels]
    runs-on: ubuntu-latest
    # Optional: add `environment: pypi` for deploy approvals / protection rules.
    permissions:
      id-token: write
    # Publish only for Python release tags (prefix "py"); R/CRAN tags are ignored.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/py')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: cibw-wheels-*
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
